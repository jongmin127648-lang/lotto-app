<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>로또 앱</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#0b0b0d;
  color:white;
}

/* 🔥 상단 앱바 */
.appbar{
  position:sticky;
  top:0;
  background:rgba(20,20,22,0.95);
  backdrop-filter: blur(20px);
  padding:18px;
  font-size:18px;
  font-weight:700;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* 🔥 전체 컨테이너 */
.container{
  padding:16px;
}

/* 🔥 카드 */
.card{
  background:rgba(255,255,255,0.06);
  border-radius:22px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 12px 30px rgba(0,0,0,0.45);
}

/* 🔥 라벨 */
.label{
  font-size:13px;
  opacity:0.7;
  margin-bottom:10px;
}

/* 🔥 버튼 */
.btn{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:16px;
  font-weight:700;
  background:linear-gradient(145deg,#ffd60a,#ffb300);
  color:black;
}

/* 🔥 결과 */
.result{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* 🔥 줄 */
.line{
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
}

/* 🔥 공 */
.ball{
  width:34px;
  height:34px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:4px;
  font-weight:bold;
}

/* 🔥 번호 선택 grid */
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  margin-top:10px;
}

/* 🔥 번호 칩 */
.num{
  width:100%;
  aspect-ratio:1/1;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:13px;
  transition:0.2s;
  user-select:none;
}

.num.active{
  background:#ffd60a;
  color:black;
  transform:scale(1.1);
  font-weight:800;
}

/* 🔥 토스트 */
.toast{
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,59,48,0.92);
  padding:12px 18px;
  border-radius:12px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<div class="appbar">🎲 로또 생성기</div>
<div id="toast" class="toast"></div>

<div class="container">

  <!-- 🔥 고정 번호 선택 -->
  <div class="card">
    <div class="label">고정 번호 (최대 6개 선택)</div>
    <div id="grid" class="grid"></div>
    <button class="btn" onclick="clearFixed()">초기화</button>
  </div>

  <!-- 🔥 생성 -->
  <div class="card">
    <button class="btn" onclick="generate()">🎰 번호 생성</button>
  </div>

  <!-- 🔥 결과 -->
  <div class="card">
    <div class="label">결과</div>
    <div id="result" class="result"></div>
  </div>

</div>

<script>

let fixed = [];

/* 🔥 진동 */
function vibrate(){
  if(navigator.vibrate) navigator.vibrate(60);
}

/* 🔥 토스트 */
function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1800);
}

/* 🔥 1~45 버튼 생성 */
function createGrid(){
  const grid=document.getElementById("grid");

  for(let i=1;i<=45;i++){
    const btn=document.createElement("div");
    btn.className="num";
    btn.innerText=i;

    btn.onclick=()=>{

      if(btn.classList.contains("active")){
        btn.classList.remove("active");
        fixed = fixed.filter(n=>n!==i);
      }else{

        if(fixed.length>=6){
          toast("최대 6개까지만 선택 가능합니다");
          return;
        }

        btn.classList.add("active");
        fixed.push(i);
      }

      vibrate();
    };

    grid.appendChild(btn);
  }
}

/* 🔥 초기화 */
function clearFixed(){
  fixed=[];
  document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
  toast("초기화 완료");
}

/* 🔥 색상 */
function color(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaa";
  return "#b0d840";
}

/* 🔥 생성 */
function generate(){

  vibrate();

  let nums=[...fixed];

  while(nums.length<6){
    let n=Math.floor(Math.random()*45)+1;
    if(!nums.includes(n)) nums.push(n);
  }

  nums.sort((a,b)=>a-b);

  let html=nums.map(n=>
    `<div class="ball" style="background:${color(n)}">${n}</div>`
  ).join("");

  document.getElementById("result").innerHTML=
    `<div class="line">${html}</div>`;

  toast("번호 생성 완료 🎉");
}

createGrid();

</script>

</body>
</html>
