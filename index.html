<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>로또 앱</title>

<!-- ✅ PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f10">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#0f0f10;
  color:white;
}

.appbar{
  position:sticky;
  top:0;
  background:rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  padding:16px;
  font-size:18px;
  font-weight:bold;
  border-bottom:1px solid rgba(255,255,255,0.08);

  display:flex;
  align-items:center;
  justify-content:center;
}

.title{
  text-align:center;
  cursor:pointer;
}

.container{
  padding:15px;
  padding-bottom:40px;
}

.card{
  background:rgba(255,255,255,0.06);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.label{
  font-size:13px;
  opacity:0.7;
  margin-bottom:6px;
}

input, select{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:white;
  font-size:15px;
  margin-top:6px;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:14px;
  font-size:14px;
  font-weight:bold;
  color:black;
  background:linear-gradient(145deg,#ffd60a,#ffb300);
}

.result{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.line{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
}

.ball{
  width:34px;
  height:34px;
  line-height:34px;
  border-radius:50%;
  text-align:center;
  margin:4px;
  font-size:14px;
  font-weight:bold;
}

.loading{
  text-align:center;
  padding:20px;
  opacity:0.7;
}

.history{
  font-size:13px;
  opacity:0.8;
}

.refresh{
  animation:refreshAnim 0.35s ease;
}

@keyframes refreshAnim{
  40%{transform:scale(0.98); filter:blur(2px);}
}
</style>
</head>

<body>

<div class="appbar">
  <div class="title" onclick="resetApp()">🎲 로또 생성기</div>
</div>

<div class="container">

  <div class="card">
    <div class="label">로또 수량</div>
    <select id="count">
      <option value="1">1줄</option>
      <option value="5" selected>5줄</option>
      <option value="10">10줄</option>
    </select>

    <div class="label" style="margin-top:12px;">고정 번호</div>
    <input id="fixed" placeholder="예: 1,2,3,4">

    <div class="label" style="margin-top:12px;">고정 번호 적용 줄</div>
    <select id="fixedCount">
      <option value="0" selected>고정 안함</option>
      <option value="1">1줄 고정</option>
      <option value="2">2줄 고정</option>
      <option value="3">3줄 고정</option>
      <option value="4">4줄 고정</option>
      <option value="5">5줄 고정</option>
    </select>

    <button class="btn" onclick="generate()">🎰 로또 번호 생성기</button>

    <!-- ✅ 설치 버튼 -->
    <button id="installBtn" class="btn" style="display:none;">
      📲 앱으로 설치하기
    </button>
  </div>

  <div class="card">
    <div class="label">결과</div>
    <div id="result" class="result"></div>
  </div>

  <div class="card">
    <div class="label">최근 기록</div>
    <div id="history" class="history"></div>
  </div>

</div>

<script>
let history = [];

function saveHistory(nums){
  history.unshift(nums);
  if(history.length > 10) history.pop();
  renderHistory();
}

function renderHistory(){
  document.getElementById("history").innerHTML =
    history.map((h,i)=>`${i+1}. ${h.join(", ")}`).join("<br>");
}

function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaaaaa";
  return "#b0d840";
}

function generate(){
  let count=parseInt(countEl.value)||1;
  let fixedInput=fixedEl.value||"";
  let fixedCount=parseInt(fixedCountEl.value)||0;

  let fixed=fixedInput.split(",")
    .map(n=>parseInt(n))
    .filter(n=>!isNaN(n)&&n>=1&&n<=45);

  fixed=[...new Set(fixed)];

  result.innerHTML = `<div class="loading">🎰 생성 중...</div>`;

  setTimeout(()=>{
    let output="";
    for(let i=0;i<count;i++){
      let nums = (i<fixedCount && fixed.length>0) ? [...fixed] : [];

      while(nums.length<6){
        let n=Math.floor(Math.random()*45)+1;
        if(!nums.includes(n)) nums.push(n);
      }

      nums.sort((a,b)=>a-b);

      output+=`
        <div class="line">
          <div style="width:30px;opacity:0.6">${i+1}</div>
          ${nums.map(n=>`<div class="ball" style="background:${getColor(n)}">${n}</div>`).join("")}
        </div>
      `;

      saveHistory(nums);
    }

    result.innerHTML = output;
  },300);
}

function resetApp(){
  fixedEl.value="";
  countEl.value="5";
  fixedCountEl.value="0";
  result.innerHTML="";
}

const countEl = document.getElementById("count");
const fixedEl = document.getElementById("fixed");
const fixedCountEl = document.getElementById("fixedCount");
const result = document.getElementById("result");

/* ✅ PWA 설치 */
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.addEventListener("click", async () => {
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.style.display = "none";
});

/* ✅ 서비스워커 등록 */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

renderHistory();
</script>

</body>
</html>
