<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 1등 해보자~</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffcc00">

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #1f1f1f, #2e2e2e);
  color:white;
  text-align:center;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  margin:20px;
  padding:20px;
  border-radius:15px;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
  margin:5px;
  cursor:pointer;
}

input, select {
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

.ball {
  display:inline-block;
  padding:12px 16px;
  border-radius:50%;
  margin:5px;
  font-weight:bold;
  color:black;
}

.loading {
  font-size:20px;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity:0.3; }
}
</style>
</head>

<body>

<h1>🎲 로또 1등 해보자~</h1>

<div class="card">
  <select id="count">
    <option value="1">1줄</option>
    <option value="5" selected>5줄</option>
    <option value="10">10줄</option>
  </select>

  <br>

  <input id="fixed" placeholder="고정 번호 (예: 1,2,3)">
  
  <br>

  <button onclick="generate()">번호 생성</button>
  <button onclick="reset()">초기화</button>

  <br><br>

  <button onclick="loadRealData()">📡 데이터 불러오기</button>
  <button onclick="aiPick()">🤖 AI 추천</button>
</div>

<div class="card" id="result"></div>

<script>
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaa";
  return "#b0d840";
}

function generate(){
  let count=document.getElementById("count").value;
  let fixedInput=document.getElementById("fixed").value;
  let fixed=fixedInput.split(",").map(n=>parseInt(n)).filter(n=>!isNaN(n));

  document.getElementById("result").innerHTML="<div class='loading'>🎰 생성중...</div>";

  setTimeout(()=>{
    let output="";

    for(let i=0;i<count;i++){
      let nums=[...fixed];

      while(nums.length<6){
        let n=Math.floor(Math.random()*45)+1;
        if(!nums.includes(n)) nums.push(n);
      }

      nums=nums.slice(0,6);
      nums.sort((a,b)=>a-b);

      let balls=nums.map(n=>`<span class="ball" style="background:${getColor(n)}">${n}</span>`).join("");

      output+=`<div>${i+1}번: ${balls}</div>`;
    }

    document.getElementById("result").innerHTML=output;

  }, 500);
}

function reset(){
  document.getElementById("result").innerHTML="";
}

// ===== 실제 데이터 =====
let realData = [];

async function loadRealData(){
  try{
    document.getElementById("result").innerHTML="<div class='loading'>📡 데이터 불러오는 중...</div>";

    let results = [];

    for(let i=1100; i>1080; i--){
      let res = await fetch(`https://api.allorigins.win/raw?url=https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=${i}`);
      let data = await res.json();

      if(data.returnValue==="success"){
        results.push([
          data.drwtNo1,
          data.drwtNo2,
          data.drwtNo3,
          data.drwtNo4,
          data.drwtNo5,
          data.drwtNo6
        ]);
      }
    }

    realData = results;
    document.getElementById("result").innerHTML="✅ 데이터 로딩 완료 (20회)";
  }catch(e){
    alert("데이터 불러오기 실패");
  }
}

// ===== AI 추천 =====
function aiPick(){
  if(realData.length === 0){
    alert("먼저 데이터 불러오기 버튼 눌러주세요");
    return;
  }

  let count = {};

  realData.forEach(nums=>{
    nums.forEach(n=>{
      count[n] = (count[n]||0)+1;
    });
  });

  let sorted = Object.entries(count)
    .sort((a,b)=>b[1]-a[1])
    .map(x=>parseInt(x[0]));

  let result = [];

  result.push(...sorted.slice(0,3));

  while(result.length<6){
    let n=Math.floor(Math.random()*45)+1;
    if(!result.includes(n)) result.push(n);
  }

  result.sort((a,b)=>a-b);

  let balls = result.map(n=>`<span class="ball" style="background:${getColor(n)}">${n}</span>`).join("");

  document.getElementById("result").innerHTML = "<h3>🤖 AI 추천 번호</h3>"+balls;
}
</script>

</body>
</html>
