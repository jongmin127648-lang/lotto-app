<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 앱</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background: #1c1c1e;
  color:white;
}

/* 상단 */
header {
  text-align:center;
  padding:20px 10px;
  font-size:22px;
  font-weight:bold;
}

/* 카드 */
.card {
  background: rgba(255,255,255,0.08);
  margin:15px;
  padding:15px;
  border-radius:20px;
  backdrop-filter: blur(15px);
}

/* 한 줄 설정 */
.row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:10px 0;
  gap:10px;
}

.label {
  font-size:14px;
  opacity:0.8;
}

/* input/select */
input, select {
  flex:1;
  padding:10px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:white;
}

/* 버튼 하단 고정 */
.bottom {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#1c1c1e;
  padding:10px;
  display:flex;
  gap:10px;
  box-shadow:0 -5px 20px rgba(0,0,0,0.4);
}

.bottom button {
  flex:1;
  padding:15px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.primary {
  background:linear-gradient(145deg,#ffd700,#ffb300);
}

.secondary {
  background:#3a3a3c;
  color:white;
}

/* 번호 */
.ball {
  display:inline-block;
  padding:10px;
  border-radius:50%;
  margin:3px;
  font-size:13px;
  animation:pop 0.4s forwards;
}

@keyframes pop {
  0%{transform:scale(0);}
  70%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

.loading {
  text-align:center;
  animation:blink 0.8s infinite;
}

@keyframes blink {
  50%{opacity:0.3;}
}
</style>
</head>

<body>

<header>🎲 로또 생성기</header>

<!-- 설정 -->
<div class="card">

  <!-- 로또 수량 -->
  <div class="row">
    <span class="label">🎟 로또 수량</span>
    <select id="count">
      <option value="1">1줄</option>
      <option value="5" selected>5줄</option>
      <option value="10">10줄</option>
    </select>
  </div>

  <!-- 고정 번호 -->
  <div class="row">
    <span class="label">📌 고정 번호</span>
    <input id="fixed" placeholder="예: 1,2,3 (최대 6개)">
  </div>

  <!-- 고정 줄 -->
  <div class="row">
    <span class="label">📍 고정 줄</span>
    <select id="fixedCount">
      <option value="0">없음</option>
      <option value="1" selected>1줄</option>
      <option value="2">2줄</option>
      <option value="3">3줄</option>
      <option value="4">4줄</option>
      <option value="5">5줄</option>
    </select>
  </div>

</div>

<!-- 결과 -->
<div class="card" id="result"></div>
<div class="card" id="history"></div>

<!-- 하단 버튼 -->
<div class="bottom">
  <button class="secondary" onclick="reset()">초기화</button>
  <button class="primary" onclick="generate()">번호 생성</button>
</div>

<script>
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaa";
  return "#b0d840";
}

let history=[];

function saveHistory(nums){
  history.unshift(nums);
  if(history.length>10) history.pop();

  let html="<h3>📜 기록</h3>";
  history.forEach((h,i)=>{
    html+=`${i+1}. ${h.join(", ")}<br>`;
  });

  document.getElementById("history").innerHTML=html;
}

function generate(){
  let count=parseInt(document.getElementById("count").value);
  let fixedInput=document.getElementById("fixed").value;
  let fixedCount=parseInt(document.getElementById("fixedCount").value);

  let fixed=fixedInput.split(",")
    .map(n=>parseInt(n))
    .filter(n=>!isNaN(n)&&n>=1&&n<=45);

  fixed=[...new Set(fixed)];

  if(fixed.length>6){
    alert("최대 6개까지만 가능");
    return;
  }

  document.getElementById("result").innerHTML="<div class='loading'>🎰 생성중...</div>";

  setTimeout(()=>{
    let output="";

    for(let i=0;i<count;i++){
      let nums=[];

      if(i<fixedCount && fixed.length>0){
        nums=[...fixed];
      }

      while(nums.length<6){
        let n=Math.floor(Math.random()*45)+1;
        if(!nums.includes(n)) nums.push(n);
      }

      nums.sort((a,b)=>a-b);

      let balls=nums.map((n)=>
        `<span class="ball" style="background:${getColor(n)}">${n}</span>`
      ).join("");

      output+=`<div style="margin:10px 0">${i+1}줄 ${balls}</div>`;

      saveHistory(nums);
    }

    document.getElementById("result").innerHTML=output;

  },500);
}

function reset(){
  document.getElementById("result").innerHTML="";
}
</script>

</body>
</html>
