<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 앱 PRO</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:#1c1c1e;
  color:white;
}

/* 헤더 */
header {
  text-align:center;
  padding:18px;
  font-size:22px;
  font-weight:bold;
}

/* 광고 배너 */
.ad {
  margin:10px 15px;
  padding:12px;
  border-radius:15px;
  background:linear-gradient(90deg,#ffcc00,#ff9900);
  color:black;
  font-weight:bold;
  text-align:center;
}

/* 카드 */
.card {
  background:rgba(255,255,255,0.08);
  margin:15px;
  padding:15px;
  border-radius:18px;
  backdrop-filter: blur(10px);
}

/* row */
.row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:10px 0;
  gap:10px;
}

.label {
  font-size:13px;
  opacity:0.8;
}

input, select {
  flex:1;
  padding:10px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:white;
}

/* 버튼 */
.bottom {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  gap:10px;
  padding:10px;
  background:#1c1c1e;
}

.bottom button {
  flex:1;
  padding:15px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.primary { background:linear-gradient(145deg,#ffd700,#ffb300); }
.secondary { background:#3a3a3c; color:white; }

/* 번호 */
.ball {
  display:inline-block;
  padding:10px;
  border-radius:50%;
  margin:3px;
  font-size:13px;
  transform:scale(0);
  animation:pop 0.3s forwards;
}

@keyframes pop {
  0%{transform:scale(0);}
  70%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

/* 슬롯머신 */
.slot {
  font-size:18px;
  text-align:center;
  letter-spacing:2px;
  padding:10px;
  opacity:0.7;
  animation:spin 0.08s infinite;
}

@keyframes spin {
  0%{transform:translateY(0);}
  50%{transform:translateY(-2px);}
  100%{transform:translateY(2px);}
}

/* 확률 */
.prob {
  font-size:13px;
  line-height:1.6;
  opacity:0.9;
}
</style>
</head>

<body>

<header>🎲 로또 PRO</header>

<!-- 🔥 광고 -->
<div class="ad">🔥 오늘의 이벤트: 1등 당첨 시 커피 쿠폰 지급!</div>

<div class="card">

  <div class="row">
    <span class="label">🎟 수량</span>
    <select id="count">
      <option value="1">1줄</option>
      <option value="5" selected>5줄</option>
      <option value="10">10줄</option>
    </select>
  </div>

  <div class="row">
    <span class="label">📌 고정번호</span>
    <input id="fixed" placeholder="예: 1,2,3 (최대 6개)">
  </div>

  <div class="row">
    <span class="label">📍 고정줄</span>
    <select id="fixedCount">
      <option value="0">없음</option>
      <option value="1" selected>1줄</option>
      <option value="2">2줄</option>
      <option value="3">3줄</option>
    </select>
  </div>

</div>

<!-- 🔥 확률 시뮬레이터 -->
<div class="card">
  <h3>📊 당첨 확률 시뮬레이터</h3>
  <div class="prob">
    🎯 1등 확률: 1 / 8,145,060<br>
    🎯 2등 확률: 1 / 1,357,510<br>
    🎯 3등 확률: 1 / 35,724<br>
    🎯 4등 확률: 1 / 733<br>
    🎯 5등 확률: 1 / 45<br><br>
    💡 기대값: -50% ~ -70% (현실)
  </div>
</div>

<!-- 🔥 광고 -->
<div class="ad">💰 프리미엄 가입하면 광고 제거!</div>

<!-- 결과 -->
<div class="card" id="result"></div>
<div class="card" id="history"></div>

<div class="bottom">
  <button class="secondary" onclick="reset()">초기화</button>
  <button class="primary" onclick="generate()">자동 생성</button>
</div>

<script>
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaa";
  return "#b0d840";
}

let history=[];

function saveHistory(nums){
  history.unshift(nums);
  if(history.length>10) history.pop();

  let html="<h3>📜 기록</h3>";
  history.forEach((h,i)=>{
    html+=`${i+1}. ${h.join(", ")}<br>`;
  });

  document.getElementById("history").innerHTML=html;
}

/* 🔥 슬롯머신 효과 */
function slotAnimation(cb){
  let el=document.getElementById("result");
  el.innerHTML="<div class='slot'>🎰 생성중... 돌리는 중...</div>";

  let count=0;
  let timer=setInterval(()=>{
    el.innerHTML="<div class='slot'>"+Math.random().toString().slice(2,8)+"</div>";
    count++;

    if(count>15){
      clearInterval(timer);
      cb();
    }
  },80);
}

/* 생성 */
function generate(){

  let count=parseInt(document.getElementById("count").value);
  let fixedInput=document.getElementById("fixed").value;
  let fixedCount=parseInt(document.getElementById("fixedCount").value);

  let fixed=fixedInput.split(",")
    .map(n=>parseInt(n))
    .filter(n=>!isNaN(n)&&n>=1&&n<=45);

  fixed=[...new Set(fixed)];

  if(fixed.length>6){
    alert("최대 6개");
    return;
  }

  slotAnimation(()=>{

    let output="";

    for(let i=0;i<count;i++){

      let nums=[];

      if(i<fixedCount && fixed.length>0){
        nums=[...fixed];
      }

      while(nums.length<6){
        let n=Math.floor(Math.random()*45)+1;
        if(!nums.includes(n)) nums.push(n);
      }

      nums.sort((a,b)=>a-b);

      let balls=nums.map(n=>
        `<span class="ball" style="background:${getColor(n)}">${n}</span>`
      ).join("");

      output+=`<div style="margin:10px 0">${i+1}줄 ${balls}</div>`;

      saveHistory(nums);
    }

    document.getElementById("result").innerHTML=output;
  });
}

function reset(){
  document.getElementById("result").innerHTML="";
}
</script>

</body>
</html>
