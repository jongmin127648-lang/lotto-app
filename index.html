<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>로또 앱</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#0f0f10;
  color:white;
}
.appbar{
  position:sticky;
  top:0;
  background:rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  padding:16px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}
.container{
  padding:15px;
  padding-bottom:40px;
}
.card{
  background:rgba(255,255,255,0.06);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.label{
  font-size:13px;
  opacity:0.7;
  margin-bottom:6px;
}
input, select{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:white;
  font-size:15px;
  margin-top:6px;
}

/* 👉 모바일에서는 select 숨김 */
@media (max-width:768px){
  select{
    display:none;
  }
}

.btn{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:14px;
  font-size:14px;
  font-weight:bold;
  color:black;
  background:linear-gradient(145deg,#ffd60a,#ffb300);
}
.result{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.line{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
}
.ball{
  width:34px;
  height:34px;
  line-height:34px;
  border-radius:50%;
  text-align:center;
  margin:4px;
  font-size:14px;
  font-weight:bold;
}
.loading{
  text-align:center;
  padding:20px;
  opacity:0.7;
}
.history{
  font-size:13px;
  opacity:0.8;
}
.refresh{
  animation:refreshAnim 0.35s ease;
}
@keyframes refreshAnim{
  40%{transform:scale(0.98); filter:blur(2px);}
}

/* 🔥 iOS 스타일 버튼 */
.ios-select{
  margin-top:10px;
  background:#2c2c2e;
  padding:14px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:15px;
}

/* 🔥 바텀시트 */
.picker-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  opacity:0;
  pointer-events:none;
  transition:0.25s;
}

.picker-sheet{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:#1c1c1e;
  border-radius:20px 20px 0 0;
  transition:0.3s;
  z-index:10;
}

.picker-header{
  display:flex;
  justify-content:space-between;
  padding:12px;
}

.picker-header button{
  background:none;
  border:none;
  color:#ffd60a;
  font-size:16px;
}

.picker-list{
  max-height:300px;
  overflow-y:auto;
  text-align:center;
}

.picker-item{
  padding:16px;
  font-size:18px;
}

.picker-item.active{
  color:#ffd60a;
  font-weight:bold;
}

.picker-open .picker-overlay{
  opacity:1;
  pointer-events:auto;
}

.picker-open .picker-sheet{
  bottom:0;
}

</style>
</head>

<body>

<div class="appbar" onclick="resetApp()">🎲 로또 생성기</div>

<div class="container">

  <div class="card">
    <div class="label">로또 수량</div>

    <!-- 기존 select 유지 -->
    <select id="count">
      <option value="1">1줄</option>
      <option value="5" selected>5줄</option>
      <option value="10">10줄</option>
    </select>

    <!-- iOS 버튼 -->
    <div class="ios-select" onclick="openPicker('count')">
      <span>선택</span>
      <div id="countText">5줄</div>
    </div>

    <div class="label" style="margin-top:12px;">고정 번호</div>
    <input id="fixed" placeholder="예: 1,2,3,4">

    <div class="label" style="margin-top:12px;">고정 번호 적용 줄</div>

    <!-- 기존 select 유지 -->
    <select id="fixedCount">
      <option value="0" selected>고정 안함</option>
      <option value="1">1줄</option>
      <option value="2">2줄</option>
      <option value="3">3줄</option>
      <option value="4">4줄</option>
      <option value="5">5줄</option>
    </select>

    <!-- iOS 버튼 -->
    <div class="ios-select" onclick="openPicker('fixedCount')">
      <span>선택</span>
      <div id="fixedCountText">고정 안함</div>
    </div>

    <button class="btn" onclick="generate()">🎰 번호 생성</button>
  </div>

  <div class="card">
    <div class="label">결과</div>
    <div id="result" class="result"></div>
  </div>

  <div class="card">
    <div class="label">최근 기록</div>
    <div id="history" class="history"></div>
  </div>

</div>

<!-- 🔥 iOS Picker -->
<div id="pickerSheet" class="picker-sheet">
  <div class="picker-header">
    <button onclick="closePicker()">취소</button>
    <button onclick="applyPicker()">확인</button>
  </div>
  <div id="pickerList" class="picker-list"></div>
</div>
<div id="pickerOverlay" class="picker-overlay" onclick="closePicker()"></div>

<script>

/* 기존 코드 그대로 유지 */
let memoryHistory=[];
let storage;
try{
  localStorage.setItem("t","1");
  localStorage.removeItem("t");
  storage=localStorage;
}catch(e){
  storage=null;
}

let history=[];
try{
  history=storage?JSON.parse(storage.getItem("lottoHistory"))||[]:memoryHistory;
}catch(e){history=[];}

function saveHistory(nums){
  history.unshift(nums);
  if(history.length>10) history.pop();
  try{
    if(storage){
      storage.setItem("lottoHistory",JSON.stringify(history));
    }else{
      memoryHistory=history;
    }
  }catch(e){}
  renderHistory();
}

function renderHistory(){
  document.getElementById("history").innerHTML=
    history.map((h,i)=>`${i+1}. ${h.join(", ")}`).join("<br>");
}

/* 🔥 iOS Picker JS */
let currentPicker=null;
let selectedValue=null;

function openPicker(type){
  currentPicker=type;
  selectedValue=null;

  let list=document.getElementById("pickerList");
  list.innerHTML="";

  let options=[];

  if(type==="count"){
    options=[{v:1,t:"1줄"},{v:5,t:"5줄"},{v:10,t:"10줄"}];
  }

  if(type==="fixedCount"){
    options=[
      {v:0,t:"고정 안함"},
      {v:1,t:"1줄"},
      {v:2,t:"2줄"},
      {v:3,t:"3줄"},
      {v:4,t:"4줄"},
      {v:5,t:"5줄"}
    ];
  }

  options.forEach(o=>{
    let div=document.createElement("div");
    div.className="picker-item";
    div.innerText=o.t;

    div.onclick=()=>{
      document.querySelectorAll(".picker-item").forEach(i=>i.classList.remove("active"));
      div.classList.add("active");
      selectedValue=o;
    };

    list.appendChild(div);
  });

  document.body.classList.add("picker-open");
}

function closePicker(){
  document.body.classList.remove("picker-open");
}

function applyPicker(){
  if(!selectedValue) return closePicker();

  let select=document.getElementById(currentPicker);
  select.value=selectedValue.v;

  document.getElementById(currentPicker+"Text").innerText=selectedValue.t;

  closePicker();
}

/* 🔊 효과음 */
let audioCtx;
function playSound(){
  try{
    if(!audioCtx){
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    }
    let now=audioCtx.currentTime;
    for(let i=0;i<10;i++){
      let osc=audioCtx.createOscillator();
      let gain=audioCtx.createGain();
      osc.type="square";
      osc.frequency.setValueAtTime(200 + i*30, now + i*0.02);
      gain.gain.setValueAtTime(0.15, now + i*0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.02 + 0.05);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now + i*0.02);
      osc.stop(now + i*0.02 + 0.05);
    }
  }catch(e){}
}

function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaaaaa";
  return "#b0d840";
}

function generate(){
  playSound();

  let count=parseInt(document.getElementById("count").value)||1;
  let fixedInput=document.getElementById("fixed").value||"";
  let fixedCount=parseInt(document.getElementById("fixedCount").value)||0;

  let fixed=fixedInput.split(",")
    .map(n=>parseInt(n))
    .filter(n=>!isNaN(n)&&n>=1&&n<=45);

  fixed=[...new Set(fixed)];

  document.getElementById("result").innerHTML=`<div class="loading">🎰 생성 중...</div>`;

  setTimeout(()=>{
    requestAnimationFrame(()=>{
      let output="";
      for(let i=0;i<count;i++){
        let nums=[];
        if(i<fixedCount && fixed.length>0){
          nums=[...fixed];
        }
        while(nums.length<6){
          let n=Math.floor(Math.random()*45)+1;
          if(!nums.includes(n)) nums.push(n);
        }
        nums.sort((a,b)=>a-b);

        let balls=nums.map(n=>`<div class="ball" style="background:${getColor(n)}">${n}</div>`).join("");

        output+=`
          <div class="line">
            <div style="width:30px;opacity:0.6">${i+1}</div>
            ${balls}
          </div>
        `;

        saveHistory(nums);
      }

      document.getElementById("result").innerHTML=output;
    });
  },300);
}

function resetApp(){
  const container=document.querySelector(".container");
  container.classList.add("refresh");

  setTimeout(()=>{
    document.getElementById("fixed").value="";
    document.getElementById("count").value="5";
    document.getElementById("fixedCount").value="0";
    document.getElementById("result").innerHTML="";
    container.classList.remove("refresh");
  },350);
}

renderHistory();

</script>

</body>
</html>
