<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 생성기 FINAL</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffcc00">

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #1f1f1f, #2e2e2e);
  color:white;
  text-align:center;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  margin:20px;
  padding:20px;
  border-radius:15px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
  margin:5px;
  cursor:pointer;
}

input, select {
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

.ball {
  display:inline-block;
  padding:10px 14px;
  border-radius:50%;
  margin:5px;
  font-weight:bold;
  color:black;
}

.loading {
  font-size:20px;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity:0.3; }
}

</style>
</head>

<body>

<h1>🎲 로또 생성기 FINAL</h1>

<div class="card">
  <select id="count">
    <option value="1">1줄</option>
    <option value="5" selected>5줄</option>
    <option value="10">10줄</option>
  </select>

  <br>

  <input id="fixed" placeholder="고정 번호 입력 (예: 1,2,3)">
  
  <br>
  <button onclick="generate()">번호 생성</button>
  <button onclick="reset()">초기화</button>
</div>

<div class="card">
  <h3>🏆 당첨번호</h3>
  <input id="win" placeholder="자동 입력 가능">
  <button onclick="getLotto()">자동 불러오기</button>
  <button onclick="checkWin()">비교</button>
</div>

<div class="card" id="result"></div>

<script>
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaa";
  return "#b0d840";
}

let lastNumbers=[];

function generate(){
  let count=document.getElementById("count").value;
  let fixedInput=document.getElementById("fixed").value;
  let fixed=fixedInput.split(",").map(n=>parseInt(n)).filter(n=>!isNaN(n));

  document.getElementById("result").innerHTML="<div class='loading'>🎰 생성중...</div>";

  setTimeout(()=>{
    let output="";
    lastNumbers=[];

    for(let i=0;i<count;i++){
      let nums=[...fixed];

      while(nums.length<6){
        let n=Math.floor(Math.random()*45)+1;
        if(!nums.includes(n)) nums.push(n);
      }

      nums=nums.slice(0,6);
      nums.sort((a,b)=>a-b);
      lastNumbers.push(nums);

      let balls=nums.map(n=>`<span class="ball" style="background:${getColor(n)}">${n}</span>`).join("");

      output+=`<div>${i+1}번: ${balls}</div>`;
    }

    document.getElementById("result").innerHTML=output;

  }, 500);
}

function reset(){
  document.getElementById("result").innerHTML="";
}

function checkWin(){
  let win=document.getElementById("win").value.split(",").map(n=>parseInt(n));
  let output="";

  lastNumbers.forEach((nums,i)=>{
    let match=nums.filter(n=>win.includes(n)).length;
    output+=`${i+1}번: ${nums.join(", ")} 👉 ${match}개 맞음<br>`;
  });

  document.getElementById("result").innerHTML=output;
}

async function getLotto(){
  try{
    let res=await fetch("https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=latest");
    let data=await res.json();

    let nums=[
      data.drwtNo1,
      data.drwtNo2,
      data.drwtNo3,
      data.drwtNo4,
      data.drwtNo5,
      data.drwtNo6
    ];

    document.getElementById("win").value=nums.join(",");
  }catch(e){
    alert("불러오기 실패");
  }
}
</script>

</body>
</html>
