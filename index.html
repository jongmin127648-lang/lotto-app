<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>로또 앱</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#0f0f10;
  color:white;
}

/* 🔥 토스트 메시지 */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,0,0,0.85);
  color:white;
  padding:12px 18px;
  border-radius:12px;
  font-size:14px;
  display:none;
  z-index:9999;
  animation:fade 2s ease;
}

@keyframes fade{
  0%{opacity:0; transform:translateX(-50%) translateY(10px);}
  10%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0;}
}

/* 기존 스타일 */
.appbar{
  position:sticky;
  top:0;
  background:rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  padding:16px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
}

.container{ padding:15px; }

.card{
  background:rgba(255,255,255,0.06);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.label{ font-size:13px; opacity:0.7; margin-bottom:6px; }

input, select{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:white;
  font-size:15px;
  margin-top:6px;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  background:linear-gradient(145deg,#ffd60a,#ffb300);
}

.result{ display:flex; flex-direction:column; gap:10px; }

.line{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
}

.ball{
  width:34px;
  height:34px;
  line-height:34px;
  border-radius:50%;
  text-align:center;
  margin:4px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="appbar">🎲 로또 생성기</div>

<!-- 🔥 토스트 -->
<div id="toast" class="toast"></div>

<div class="container">

  <div class="card">
    <div class="label">고정 번호</div>
    <input id="fixed" placeholder="예: 1,2,3,4" oninput="validateFixed()">

    <button class="btn" onclick="generate()">🎰 번호 생성</button>
  </div>

  <div class="card">
    <div id="result" class="result"></div>
  </div>

</div>

<script>

function showToast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";

  setTimeout(()=>{
    t.style.display="none";
  },2000);
}

/* 🔥 입력 즉시 검증 */
function validateFixed(){
  let input=document.getElementById("fixed");

  let nums=input.value.split(",")
    .map(n=>n.trim())
    .filter(n=>n!=="");

  let filtered=[];
  let invalid=false;

  for(let n of nums){
    let num=parseInt(n);

    if(isNaN(num) || num<1 || num>45){
      invalid=true;
      continue;
    }

    if(!filtered.includes(num)){
      filtered.push(num);
    }
  }

  if(invalid){
    showToast("⚠ 1~45 사이 숫자만 입력 가능합니다");
  }

  input.value=filtered.join(",");
}

/* 🔥 생성 */
function generate(){

  let input=document.getElementById("fixed").value;

  let fixed=input.split(",")
    .map(n=>parseInt(n))
    .filter(n=>!isNaN(n) && n>=1 && n<=45);

  fixed=[...new Set(fixed)];

  if(fixed.length !== input.split(",").filter(n=>n.trim()!=="").length){
    showToast("⚠ 잘못된 번호는 자동 제거되었습니다");
  }

  let nums=[];

  while(nums.length<6){
    let n=Math.floor(Math.random()*45)+1;
    if(!nums.includes(n)) nums.push(n);
  }

  nums.sort((a,b)=>a-b);

  let balls=nums.map(n=>
    `<div class="ball">${n}</div>`
  ).join("");

  document.getElementById("result").innerHTML=`
    <div class="line">${balls}</div>
  `;
}

</script>

</body>
</html>
