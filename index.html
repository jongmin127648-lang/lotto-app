<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 1등 해보자~</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffcc00">

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #1f1f1f, #2e2e2e);
  color:white;
  text-align:center;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  margin:20px;
  padding:20px;
  border-radius:15px;
}

button {
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
  margin:5px;
  cursor:pointer;
  font-size:16px;
}

input, select {
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

.ball {
  display:inline-block;
  padding:12px 16px;
  border-radius:50%;
  margin:5px;
  font-weight:bold;
  color:black;
  font-size:16px;
}

.loading {
  font-size:20px;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity:0.3; }
}
</style>
</head>

<body>

<h1>🎲 로또 1등 해보자~</h1>

<div class="card">
  <select id="count">
    <option value="1">1줄</option>
    <option value="5" selected>5줄</option>
    <option value="10">10줄</option>
  </select>

  <br>

  <input id="fixed" placeholder="고정 번호 (예: 1,2,3)">
  
  <br>

  <button onclick="generate()">번호 생성</button>
  <button onclick="reset()">초기화</button>
</div>

<div class="card" id="result"></div>

<script>
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaa";
  return "#b0d840";
}

function generate(){
  let count=document.getElementById("count").value;
  let fixedInput=document.getElementById("fixed").value;
  let fixed=fixedInput.split(",").map(n=>parseInt(n)).filter(n=>!isNaN(n));

  document.getElementById("result").innerHTML="<div class='loading'>🎰 생성중...</div>";

  setTimeout(()=>{
    let output="";

    for(let i=0;i<count;i++){
      let nums=[...fixed];

      while(nums.length<6){
        let n=Math.floor(Math.random()*45)+1;
        if(!nums.includes(n)) nums.push(n);
      }

      nums=nums.slice(0,6);
      nums.sort((a,b)=>a-b);

      let balls=nums.map(n=>`<span class="ball" style="background:${getColor(n)}">${n}</span>`).join("");

      output+=`<div>${i+1}번: ${balls}</div>`;
    }

    document.getElementById("result").innerHTML=output;

  }, 500);
}

function reset(){
  document.getElementById("result").innerHTML="";
}
</script>

</body>
</html>
