<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>로또 앱</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#0f0f10;
  color:white;
}
.appbar{
  position:sticky;
  top:0;
  background:rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  padding:16px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}
.container{
  padding:15px;
  padding-bottom:40px;
  transition:all 0.2s ease;
}
.card{
  background:rgba(255,255,255,0.06);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.label{
  font-size:13px;
  opacity:0.7;
  margin-bottom:6px;
}
input, select{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:white;
  font-size:15px;
  margin-top:6px;
}
.btn{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:14px;
  font-size:14px;
  font-weight:bold;
  color:black;
  background:linear-gradient(145deg,#ffd60a,#ffb300);
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}
.btn:active{
  transform:scale(0.97);
}
.result{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.line{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
}
.ball{
  width:34px;
  height:34px;
  line-height:34px;
  border-radius:50%;
  text-align:center;
  margin:4px;
  font-size:14px;
  font-weight:bold;
  animation:pop 0.3s ease;
}
@keyframes pop{
  0%{transform:scale(0);}
  70%{transform:scale(1.2);}
  100%{transform:scale(1);}
}
.history{
  font-size:13px;
  opacity:0.8;
  line-height:1.6;
}
.loading{
  text-align:center;
  padding:20px;
  opacity:0.7;
}
.toast{
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,0,0,0.9);
  color:white;
  padding:12px 18px;
  border-radius:12px;
  font-size:14px;
  display:none;
  z-index:9999;
  max-width:90%;
  text-align:center;
}
.refresh{
  animation:refreshAnim 0.35s ease;
}
@keyframes refreshAnim{
  0%{transform:scale(1); filter:blur(0);}
  40%{transform:scale(0.98); filter:blur(2px);}
  100%{transform:scale(1); filter:blur(0);}
}
</style>
</head>

<body>

<div class="appbar" onclick="resetApp()">🎲 로또 생성기</div>
<div id="toast" class="toast"></div>

<div class="container">

  <div class="card">
    <div class="label">로또 수량</div>
    <select id="count">
      <option value="1">1줄</option>
      <option value="5" selected>5줄</option>
      <option value="10">10줄</option>
    </select>

    <div class="label" style="margin-top:12px;">고정 번호</div>
    <input id="fixed" placeholder="예: 1,2,3,4" oninput="validateFixed()">

    <div class="label" style="margin-top:12px;">고정 번호 적용 줄</div>
    <select id="fixedCount">
      <option value="0" selected>고정 안함</option>
      <option value="1">1줄</option>
      <option value="2">2줄</option>
      <option value="3">3줄</option>
      <option value="4">4줄</option>
      <option value="5">5줄</option>
    </select>

    <button class="btn" onclick="generate()">🎰 번호 생성</button>
  </div>

  <div class="card">
    <div class="label">결과</div>
    <div id="result" class="result"></div>
  </div>

  <div class="card">
    <div class="label">최근 기록</div>
    <div id="history" class="history"></div>
  </div>

</div>

<script>

/* 🔥 카톡 대응: 안전 저장소 */
let memoryHistory = [];

function getStorage(){
  try{
    const testKey="test";
    localStorage.setItem(testKey,"1");
    localStorage.removeItem(testKey);
    return localStorage;
  }catch(e){
    return null;
  }
}

const storage = getStorage();

let history = [];

try{
  if(storage){
    history = JSON.parse(storage.getItem("lottoHistory")) || [];
  }else{
    history = memoryHistory;
  }
}catch(e){
  history = [];
}

/* 🔥 저장 */
function saveHistory(nums){
  history.unshift(nums);
  if(history.length > 10) history.pop();

  try{
    if(storage){
      storage.setItem("lottoHistory", JSON.stringify(history));
    }else{
      memoryHistory = history;
    }
  }catch(e){}

  renderHistory();
}

/* 🔥 렌더 */
function renderHistory(){
  try{
    document.getElementById("history").innerHTML =
      history.map((h,i)=>`${i+1}. ${h.join(", ")}`).join("<br>");
  }catch(e){}
}

/* 🔥 진동 */
function vibrate(){
  try{
    if(navigator.vibrate){
      navigator.vibrate(80);
    }
  }catch(e){}
}

/* 🔥 색상 */
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaaaaa";
  return "#b0d840";
}

/* 🔥 입력 검증 */
function validateFixed(){
  let input=document.getElementById("fixed");
  let value=input.value;

  if(/[^0-9, ]/.test(value)){
    input.value=value.replace(/[^0-9, ]/g,'');
    return;
  }
}

/* 🔥 생성 */
function generate(){

  vibrate();

  try{

    let count=parseInt(document.getElementById("count").value) || 1;
    let fixedInput=document.getElementById("fixed").value || "";
    let fixedCount=parseInt(document.getElementById("fixedCount").value) || 0;

    let fixed=fixedInput.split(",")
      .map(n=>parseInt(n))
      .filter(n=>!isNaN(n)&&n>=1&&n<=45);

    fixed=[...new Set(fixed)];

    document.getElementById("result").innerHTML =
      `<div class="loading">🎰 생성 중...</div>`;

    setTimeout(()=>{
      requestAnimationFrame(()=>{

        let output="";

        for(let i=0;i<count;i++){

          let nums=[];

          if(i<fixedCount && fixed.length>0){
            nums=[...fixed];
          }

          while(nums.length<6){
            let n=Math.floor(Math.random()*45)+1;
            if(!nums.includes(n)) nums.push(n);
          }

          nums.sort((a,b)=>a-b);

          let balls=nums.map(n=>
            `<div class="ball" style="background:${getColor(n)}">${n}</div>`
          ).join("");

          output+=`
            <div class="line">
              <div style="width:30px;opacity:0.6">${i+1}</div>
              ${balls}
            </div>
          `;

          saveHistory(nums);
        }

        document.getElementById("result").innerHTML=output;

      });
    },300);

  }catch(e){
    console.log("error:",e);
  }
}

/* 🔥 리셋 */
function resetApp(){

  vibrate();

  const container=document.querySelector(".container");
  container.classList.add("refresh");

  setTimeout(()=>{

    document.getElementById("fixed").value="";
    document.getElementById("count").value="5";
    document.getElementById("fixedCount").value="0";
    document.getElementById("result").innerHTML="";

    container.classList.remove("refresh");

  },350);
}

renderHistory();

</script>

</body>
</html>
