<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>로또 앱</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#0f0f10;
  color:white;
}

/* 🔥 앱바 */
.appbar{
  position:sticky;
  top:0;
  background:rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  padding:16px;
  font-size:18px;
  font-weight:bold;
  border-bottom:1px solid rgba(255,255,255,0.08);

  display:flex;
  align-items:center;
  justify-content:center;
}

.title{
  text-align:center;
  cursor:pointer;
}

.container{
  padding:15px;
  padding-bottom:40px;
}

.card{
  background:rgba(255,255,255,0.06);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.label{
  font-size:13px;
  opacity:0.7;
  margin-bottom:6px;
}

input, select{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:white;
  font-size:15px;
  margin-top:6px;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:14px;
  font-size:14px;
  font-weight:bold;
  color:black;
  background:linear-gradient(145deg,#ffd60a,#ffb300);
}

.result{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.line{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
}

.ball{
  width:34px;
  height:34px;
  line-height:34px;
  border-radius:50%;
  text-align:center;
  margin:4px;
  font-size:14px;
  font-weight:bold;
}

.loading{
  text-align:center;
  padding:20px;
  opacity:0.7;
}

.history{
  font-size:13px;
  opacity:0.8;
}

.refresh{
  animation:refreshAnim 0.35s ease;
}

@keyframes refreshAnim{
  40%{transform:scale(0.98); filter:blur(2px);}
}

/* 모바일 select 개선 */
@media (max-width:768px){
  select{
    appearance:none;
    -webkit-appearance:none;
    padding-right:48px;

    background-image:url("data:image/svg+xml;utf8,\
    <svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' fill='white'>\
    <path d='M5 7l5 5 5-5' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/>\
    </svg>");
    
    background-repeat:no-repeat;
    background-position:right 14px center;
    background-size:18px;
  }
}
</style>
</head>

<body>

<!-- 🔥 앱바 -->
<div class="appbar">
  <div class="title" onclick="resetApp()">🎲 로또 생성기</div>
</div>

<div class="container">

  <div class="card">
    <div class="label">로또 수량</div>
    <select id="count">
      <option value="1">1줄</option>
      <option value="5" selected>5줄</option>
      <option value="10">10줄</option>
    </select>

    <div class="label" style="margin-top:12px;">고정 번호</div>
    <input id="fixed" placeholder="예: 1,2,3,4">

    <div class="label" style="margin-top:12px;">고정 번호 적용 줄</div>
    <select id="fixedCount">
      <option value="0" selected>고정 안함</option>
      <option value="1">1줄 고정</option>
      <option value="2">2줄 고정</option>
      <option value="3">3줄 고정</option>
      <option value="4">4줄 고정</option>
      <option value="5">5줄 고정</option>
    </select>

    <button class="btn" onclick="generate()">🎰 로또 번호 생성기</button>
  </div>

  <div class="card">
    <div class="label">결과</div>
    <div id="result" class="result"></div>
  </div>

  <div class="card">
    <div class="label">최근 기록</div>
    <div id="history" class="history"></div>
  </div>

</div>

<script>

/* 🔥 카톡 대응 storage */
let memoryHistory=[];
let storage;
try{
  localStorage.setItem("t","1");
  localStorage.removeItem("t");
  storage=localStorage;
}catch(e){
  storage=null;
}

let history=[];
try{
  history=storage?JSON.parse(storage.getItem("lottoHistory"))||[]:memoryHistory;
}catch(e){history=[];}

function saveHistory(nums){
  history.unshift(nums);
  if(history.length>10) history.pop();
  try{
    if(storage){
      storage.setItem("lottoHistory",JSON.stringify(history));
    }else{
      memoryHistory=history;
    }
  }catch(e){}
  renderHistory();
}

function renderHistory(){
  document.getElementById("history").innerHTML=
    history.map((h,i)=>`${i+1}. ${h.join(", ")}`).join("<br>");
}

/* 🔊 효과음 */
let audioCtx;

function playSound(){
  try{
    if(!audioCtx){
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    }

    let now=audioCtx.currentTime;

    for(let i=0;i<10;i++){
      let osc=audioCtx.createOscillator();
      let gain=audioCtx.createGain();

      osc.type="square";
      osc.frequency.setValueAtTime(200 + i*30, now + i*0.02);

      gain.gain.setValueAtTime(0.15, now + i*0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.02 + 0.05);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now + i*0.02);
      osc.stop(now + i*0.02 + 0.05);
    }

  }catch(e){}
}

/* 색상 */
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaaaaa";
  return "#b0d840";
}

/* 생성 */
function generate(){

  playSound();

  let count=parseInt(document.getElementById("count").value)||1;
  let fixedInput=document.getElementById("fixed").value||"";
  let fixedCount=parseInt(document.getElementById("fixedCount").value)||0;

  let fixed=fixedInput.split(",")
    .map(n=>parseInt(n))
    .filter(n=>!isNaN(n)&&n>=1&&n<=45);

  fixed=[...new Set(fixed)];

  document.getElementById("result").innerHTML=
    `<div class="loading">🎰 생성 중...</div>`;

  setTimeout(()=>{

    let output="";

    for(let i=0;i<count;i++){

      let nums=[];

      if(i<fixedCount && fixed.length>0){
        nums=[...fixed];
      }

      while(nums.length<6){
        let n=Math.floor(Math.random()*45)+1;
        if(!nums.includes(n)) nums.push(n);
      }

      nums.sort((a,b)=>a-b);

      let balls=nums.map(n=>
        `<div class="ball" style="background:${getColor(n)}">${n}</div>`
      ).join("");

      output+=`
        <div class="line">
          <div style="width:30px;opacity:0.6">${i+1}</div>
          ${balls}
        </div>
      `;

      saveHistory(nums);
    }

    document.getElementById("result").innerHTML=output;

  },300);
}

/* 리셋 */
function resetApp(){
  const container=document.querySelector(".container");
  container.classList.add("refresh");

  setTimeout(()=>{
    document.getElementById("fixed").value="";
    document.getElementById("count").value="5";
    document.getElementById("fixedCount").value="0";
    document.getElementById("result").innerHTML="";
    container.classList.remove("refresh");
  },350);
}

renderHistory();

</script>

</body>
</html>
