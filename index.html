<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 1등 해보자~</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffcc00">

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(180deg, #1c1c1e, #2c2c2e);
  color:white;
  text-align:center;
}

h1 { margin-top:20px; }

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  margin:15px;
  padding:20px;
  border-radius:25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

button {
  padding:12px 20px;
  border:none;
  border-radius:15px;
  background: linear-gradient(145deg, #ffd700, #ffb300);
  font-weight:bold;
  margin:5px;
  cursor:pointer;
}

button:active { transform: scale(0.95); }

input, select {
  padding:10px;
  border-radius:12px;
  border:none;
  margin:5px;
  background:#3a3a3c;
  color:white;
}

.ball {
  display:inline-block;
  padding:12px;
  border-radius:50%;
  margin:4px;
  font-size:14px;
  transform: scale(0);
  animation: pop 0.5s forwards;
}

@keyframes pop {
  0% { transform: scale(0); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.loading {
  font-size:20px;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity:0.3; }
}
</style>
</head>

<body>

<h1>🎲 로또 1등 해보자~</h1>

<div class="card">
  <select id="count">
    <option value="1">1줄</option>
    <option value="5" selected>5줄</option>
    <option value="10">10줄</option>
  </select>

  <br>

  <input id="fixed" placeholder="고정 번호 (최대 5개, 예: 1,2,3)">

  <br>

  <!-- 🔥 고정 줄 개수 선택 -->
  <select id="fixedCount">
    <option value="0">고정 안함</option>
    <option value="1" selected>1줄 고정</option>
    <option value="2">2줄 고정</option>
    <option value="3">3줄 고정</option>
    <option value="4">4줄 고정</option>
    <option value="5">5줄 고정</option>
  </select>

  <br>

  <button onclick="generate()">번호 생성</button>
  <button onclick="reset()">초기화</button>
</div>

<div class="card" id="today"></div>
<div class="card" id="result"></div>
<div class="card" id="history"></div>

<div style="margin:30px; opacity:0.6; font-size:14px;">
  💡 행운은 준비된 자에게 옵니다<br>
  🍀 오늘도 1등 가즈아~
</div>

<script>
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaa";
  return "#b0d840";
}

// 🎯 오늘 추천
function todayPick(){
  // 👉 랜덤 이름 목록
  const names = ["송하영", "박지원", "이채영", "이나경", "백지헌", "승봉 도민"];

  // 👉 랜덤 이름 선택
  const randomName = names[Math.floor(Math.random() * names.length)];

  let nums=[];
  while(nums.length<6){
    let n=Math.floor(Math.random()*45)+1;
    if(!nums.includes(n)) nums.push(n);
  }
  nums.sort((a,b)=>a-b);

  let balls = nums.map((n,i)=>
    `<span class="ball" style="background:${getColor(n)}; animation-delay:${i*0.1}s">${n}</span>`
  ).join("");

  // 👉 이름 포함 출력
  document.getElementById("today").innerHTML=
    `<h3>🎯 ${randomName} 추천 번호</h3>` + balls;
}

// 📜 기록
let history=[];
function saveHistory(nums){
  history.unshift(nums);
  if(history.length>10) history.pop();

  let html="<h3>📜 최근 생성 기록</h3>";
  history.forEach((h,i)=>{
    html+=`${i+1}: ${h.join(", ")}<br>`;
  });

  document.getElementById("history").innerHTML=html;
}

// 🎲 생성
function generate(){
  let count=parseInt(document.getElementById("count").value);
  let fixedInput=document.getElementById("fixed").value;
  let fixedCount=parseInt(document.getElementById("fixedCount").value);

  let fixed=fixedInput.split(",")
    .map(n=>parseInt(n))
    .filter(n=>!isNaN(n) && n>=1 && n<=45);

  fixed = [...new Set(fixed)];

  if(fixed.length >5){
    alert("고정 번호는 최대 5개까지 가능합니다");
    return;
  }

  document.getElementById("result").innerHTML="<div class='loading'>🎰 생성중...</div>";

  setTimeout(()=>{
    let output="";

    for(let i=0;i<count;i++){
      let nums=[];

      // 🔥 고정 줄 개수만큼 적용
      if(i < fixedCount && fixed.length > 0){
        nums = [...fixed];
      }

      while(nums.length < 6){
        let n=Math.floor(Math.random()*45)+1;
        if(!nums.includes(n)) nums.push(n);
      }

      nums.sort((a,b)=>a-b);

      let balls = nums.map((n,i)=>
        `<span class="ball" style="background:${getColor(n)}; animation-delay:${i*0.1}s">${n}</span>`
      ).join("");

      output+=`<div>${i+1}번: ${balls}</div>`;

      saveHistory(nums);
    }

    document.getElementById("result").innerHTML=output;

  },500);
}

function reset(){
  document.getElementById("result").innerHTML="";
}

window.onload = todayPick;
</script>

</body>
</html>
