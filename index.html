<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>로또 앱</title>

<!-- ✅ PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffcc00">

<style>
/* 기존 그대로 유지 */
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#0f0f10;
  color:white;
}

/* 🔥 앱바 */
.appbar{
  position:sticky;
  top:0;
  background:rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  padding:16px;
  font-size:18px;
  font-weight:bold;
  border-bottom:1px solid rgba(255,255,255,0.08);

  display:flex;
  align-items:center;
  justify-content:center;
}

.menuBtn{
  position:absolute;
  left:16px;
  font-size:20px;
  cursor:pointer;
  opacity:0.8;
}

.title{
  text-align:center;
  cursor:pointer;
}

.container{
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.06);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  color:black;
  background:linear-gradient(145deg,#ffd60a,#ffb300);
}

.installBtn{
  background:#00c853;
  color:white;
}
</style>
</head>

<body>

<div class="appbar">
  <div class="title">🎲 로또 생성기</div>
</div>

<div class="container">

  <div class="card">
    <button class="btn" onclick="generate()">🎰 번호 생성</button>

    <!-- 🔥 앱 설치 버튼 -->
    <button class="btn installBtn" id="installBtn" style="display:none;">
      📲 앱으로 설치하기
    </button>

    <!-- 카카오 안내 -->
    <div style="font-size:12px; opacity:0.6; margin-top:10px;">
      ※ 카카오톡에서는 우측 상단 메뉴 → 홈 화면 추가
    </div>
  </div>

  <div class="card">
    <div id="result"></div>
  </div>

</div>

<script>

/* 🎰 번호 생성 */
function generate(){
  let nums=[];
  while(nums.length<6){
    let n=Math.floor(Math.random()*45)+1;
    if(!nums.includes(n)) nums.push(n);
  }
  nums.sort((a,b)=>a-b);

  document.getElementById("result").innerHTML =
    nums.join(" , ");
}

/* 🔥 PWA 설치 로직 */
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
});

/* 🔥 Service Worker 등록 */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(()=>console.log("SW 등록 완료"));
}

</script>

</body>
</html>
