<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>로또 앱</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#0f0f10;
  color:white;
  padding-bottom:70px; /* 🔥 하단 네비 공간 */
}

/* 🔥 상단 */
.appbar{
  position:sticky;
  top:0;
  background:rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  padding:16px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* 🔥 컨테이너 */
.container{
  padding:15px;
  padding-bottom:40px;
}

/* 🔥 카드 */
.card{
  background:rgba(255,255,255,0.06);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* 🔥 라벨 */
.label{
  font-size:13px;
  opacity:0.7;
  margin-bottom:6px;
}

/* 🔥 입력 (overflow 해결) */
input, select{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:white;
  font-size:15px;
  margin-top:6px;
}

/* 🔥 버튼 */
.btn{
  width:100%;
  padding:18px;
  margin-top:16px;
  border:none;
  border-radius:16px;
  font-size:16px;
  font-weight:bold;
  color:black;
  background:linear-gradient(145deg,#ffd60a,#ffb300);
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.btn:active{
  transform:scale(0.97);
}

/* 🔥 결과 */
.result{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* 🔥 줄 */
.line{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
}

/* 🔥 공 */
.ball{
  width:34px;
  height:34px;
  line-height:34px;
  border-radius:50%;
  text-align:center;
  margin:4px;
  font-size:14px;
  font-weight:bold;
  animation:pop 0.3s ease;
}

@keyframes pop{
  0%{transform:scale(0);}
  70%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* 🔥 기록 */
.history{
  font-size:13px;
  opacity:0.8;
  line-height:1.6;
}

/* 🔥 로딩 */
.loading{
  text-align:center;
  padding:20px;
  opacity:0.7;
}

/* 🔥 하단 네비 */
.navbar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  background:rgba(28,28,30,0.95);
  backdrop-filter: blur(20px);
  border-top:1px solid rgba(255,255,255,0.1);
}

.navbar button{
  flex:1;
  padding:12px 0;
  background:none;
  border:none;
  color:white;
  font-size:13px;
}

.navbar button:active{
  background:rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="appbar">🎲 로또 생성기</div>

<div class="container">

  <!-- 🔥 설정 -->
  <div class="card">
    <div class="label">로또 수량</div>
    <select id="count">
      <option value="1">1줄</option>
      <option value="5" selected>5줄</option>
      <option value="10">10줄</option>
    </select>

    <div class="label" style="margin-top:12px;">고정 번호</div>
    <input id="fixed" placeholder="예: 1,2,3,4">

    <div class="label" style="margin-top:12px;">고정 적용 줄</div>
    <select id="fixedCount">
      <option value="0">안함</option>
      <option value="1" selected>1줄</option>
      <option value="2">2줄</option>
      <option value="3">3줄</option>
      <option value="4">4줄</option>
      <option value="5">5줄</option>
    </select>

    <button class="btn" onclick="generate()">🎰 번호 생성</button>
  </div>

  <!-- 🔥 결과 -->
  <div class="card">
    <div class="label">결과</div>
    <div id="result" class="result"></div>
  </div>

  <!-- 🔥 기록 -->
  <div class="card">
    <div class="label">최근 기록</div>
    <div id="history" class="history"></div>
  </div>

</div>

<!-- 🔥 하단 네비 -->
<div class="navbar">
  <button onclick="scrollTop()">🏠 홈</button>
  <button onclick="scrollResult()">🎰 결과</button>
  <button onclick="scrollHistory()">📜 기록</button>
</div>

<script>

let history = JSON.parse(localStorage.getItem("lottoHistory")) || [];

function saveHistory(nums){
  history.unshift(nums);
  if(history.length>10) history.pop();
  localStorage.setItem("lottoHistory", JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  document.getElementById("history").innerHTML =
    history.map((h,i)=>`${i+1}. ${h.join(", ")}`).join("<br>");
}

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate(80);
  }
}

function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaaaaa";
  return "#b0d840";
}

function generate(){

  vibrate(); // 🔥 진동

  let count=parseInt(document.getElementById("count").value);
  let fixedInput=document.getElementById("fixed").value;
  let fixedCount=parseInt(document.getElementById("fixedCount").value);

  let fixed=fixedInput.split(",")
    .map(n=>parseInt(n))
    .filter(n=>!isNaN(n)&&n>=1&&n<=45);

  fixed=[...new Set(fixed)];

  document.getElementById("result").innerHTML =
    `<div class="loading">🎰 생성 중...</div>`;

  setTimeout(()=>{

    let output="";

    for(let i=0;i<count;i++){

      let nums=[];

      if(i<fixedCount && fixed.length>0){
        nums=[...fixed];
      }

      while(nums.length<6){
        let n=Math.floor(Math.random()*45)+1;
        if(!nums.includes(n)) nums.push(n);
      }

      nums.sort((a,b)=>a-b);

      let balls=nums.map(n=>
        `<div class="ball" style="background:${getColor(n)}">${n}</div>`
      ).join("");

      output+=`
        <div class="line">
          <div style="width:30px;opacity:0.6">${i+1}</div>
          ${balls}
        </div>
      `;

      saveHistory(nums);
    }

    document.getElementById("result").innerHTML=output;

  },500);
}

/* 🔥 네비 */
function scrollTop(){
  window.scrollTo({top:0,behavior:"smooth"});
}
function scrollResult(){
  document.getElementById("result").scrollIntoView({behavior:"smooth"});
}
function scrollHistory(){
  document.getElementById("history").scrollIntoView({behavior:"smooth"});
}

renderHistory();

</script>

</body>
</html>
