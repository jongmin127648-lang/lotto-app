<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 1등 해보자~</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffcc00">

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(180deg, #1c1c1e, #2c2c2e);
  color:white;
  text-align:center;
}

h1 { margin-top:20px; }

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  margin:15px;
  padding:20px;
  border-radius:25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

button {
  padding:12px 20px;
  border:none;
  border-radius:15px;
  background: linear-gradient(145deg, #ffd700, #ffb300);
  font-weight:bold;
  margin:5px;
  cursor:pointer;
}

button:active { transform: scale(0.95); }

input, select {
  padding:10px;
  border-radius:12px;
  border:none;
  margin:5px;
  background:#3a3a3c;
  color:white;
}

.ball {
  display:inline-block;
  padding:12px;
  border-radius:50%;
  margin:4px;
  font-size:14px;
  transform: scale(0);
  animation: pop 0.5s forwards;
}

@keyframes pop {
  0% { transform: scale(0); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.number-grid {
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap:5px;
  margin-top:10px;
}

.num-btn {
  padding:8px;
  border-radius:10px;
  background:#3a3a3c;
  cursor:pointer;
}

.num-btn.active {
  background:#ffcc00;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🎲 로또 1등 해보자~</h1>

<div class="card">
  <select id="count">
    <option value="1">1줄</option>
    <option value="5" selected>5줄</option>
    <option value="10">10줄</option>
  </select>

  <br>

  <input id="fixed" placeholder="고정 번호 (예: 1,2,3)">
  
  <br>

  <button onclick="generate()">번호 생성</button>
  <button onclick="reset()">초기화</button>
</div>

<!-- 🎯 번호 선택 UI -->
<div class="card">
  <h3>🎯 번호 선택 (최대 5개)</h3>
  <div class="number-grid" id="grid"></div>
</div>

<div class="card" id="today"></div>
<div class="card" id="result"></div>
<div class="card" id="history"></div>

<script>
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaa";
  return "#b0d840";
}

// 🎯 번호 선택
let selected = [];

function createGrid(){
  let html="";
  for(let i=1;i<=45;i++){
    html+=`<div class="num-btn" onclick="toggleNum(${i}, this)">${i}</div>`;
  }
  document.getElementById("grid").innerHTML=html;
}

function toggleNum(n, el){
  if(selected.includes(n)){
    selected = selected.filter(x=>x!==n);
    el.classList.remove("active");
  }else{
    if(selected.length >=5){
      alert("최대 5개까지 선택");
      return;
    }
    selected.push(n);
    el.classList.add("active");
  }
}

// 🎯 오늘 추천
function todayPick(){
  let nums=[];
  while(nums.length<6){
    let n=Math.floor(Math.random()*45)+1;
    if(!nums.includes(n)) nums.push(n);
  }
  nums.sort((a,b)=>a-b);

  let balls = nums.map((n,i)=>
    `<span class="ball" style="background:${getColor(n)}; animation-delay:${i*0.1}s">${n}</span>`
  ).join("");

  document.getElementById("today").innerHTML="<h3>🎯 오늘의 추천</h3>"+balls;
}

// 📜 기록
let history=[];
function saveHistory(nums){
  history.unshift(nums);
  if(history.length>10) history.pop();

  let html="<h3>📜 최근 생성 기록</h3>";
  history.forEach((h,i)=>{
    html+=`${i+1}: ${h.join(", ")}<br>`;
  });

  document.getElementById("history").innerHTML=html;
}

// 🎲 생성
function generate(){
  let count=document.getElementById("count").value;
  let fixedInput=document.getElementById("fixed").value;

  let fixed=fixedInput.split(",")
    .map(n=>parseInt(n))
    .filter(n=>!isNaN(n));

  let finalFixed = [...new Set([...fixed, ...selected])];

  if(finalFixed.length >5){
    alert("고정 번호는 최대 5개");
    return;
  }

  document.getElementById("result").innerHTML="🎰 생성중...";

  setTimeout(()=>{
    let output="";

    for(let i=0;i<count;i++){
      let nums=[...finalFixed];

      while(nums.length<6){
        let n=Math.floor(Math.random()*45)+1;
        if(!nums.includes(n)) nums.push(n);
      }

      nums.sort((a,b)=>a-b);

      let balls = nums.map((n,i)=>
        `<span class="ball" style="background:${getColor(n)}; animation-delay:${i*0.1}s">${n}</span>`
      ).join("");

      output+=`<div>${i+1}번: ${balls}</div>`;

      saveHistory(nums);
    }

    document.getElementById("result").innerHTML=output;

  },500);
}

function reset(){
  selected=[];
  document.querySelectorAll(".num-btn").forEach(el=>el.classList.remove("active"));
  document.getElementById("result").innerHTML="";
}

window.onload = ()=>{
  todayPick();
  createGrid();
};
</script>

</body>
</html>
