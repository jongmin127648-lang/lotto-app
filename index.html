<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>로또 앱</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#0f0f10;
  color:white;
}
.appbar{
  position:sticky;
  top:0;
  background:rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  padding:16px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}
.container{
  padding:15px;
  padding-bottom:40px;
}
.card{
  background:rgba(255,255,255,0.06);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.label{
  font-size:13px;
  opacity:0.7;
  margin-bottom:6px;
}
input, select{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:white;
  font-size:15px;
  margin-top:6px;
}
.btn{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:14px;
  font-size:14px;
  font-weight:bold;
  color:black;
  background:linear-gradient(145deg,#ffd60a,#ffb300);
}
.result{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.line{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
}
.ball{
  width:34px;
  height:34px;
  line-height:34px;
  border-radius:50%;
  text-align:center;
  margin:4px;
  font-size:14px;
  font-weight:bold;
}
.loading{
  text-align:center;
  padding:20px;
  opacity:0.7;
}
.history{
  font-size:13px;
  opacity:0.8;
}

/* 🔥 스위치 */
.switch{
  position:relative;
  width:46px;
  height:26px;
}
.switch input{ display:none; }
.slider{
  position:absolute;
  cursor:pointer;
  top:0; left:0; right:0; bottom:0;
  background:#555;
  border-radius:34px;
  transition:0.3s;
}
.slider:before{
  position:absolute;
  content:"";
  height:20px;
  width:20px;
  left:3px;
  bottom:3px;
  background:white;
  border-radius:50%;
  transition:0.3s;
}
input:checked + .slider{
  background:#ffd60a;
}
input:checked + .slider:before{
  transform:translateX(20px);
}
</style>
</head>

<body>

<div class="appbar" onclick="resetApp()">🎲 로또 생성기</div>

<div class="container">

  <div class="card">
    <div class="label">로또 수량</div>
    <select id="count">
      <option value="1">1줄</option>
      <option value="5" selected>5줄</option>
      <option value="10">10줄</option>
    </select>

    <div class="label" style="margin-top:12px;">고정 번호</div>
    <input id="fixed" placeholder="예: 1,2,3,4">

    <!-- 🔥 추가된 직관 UI -->
    <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center;">
      <div class="label">고정번호 사용</div>
      <label class="switch">
        <input type="checkbox" id="fixedToggle">
        <span class="slider"></span>
      </label>
    </div>

    <button class="btn" onclick="generate()">🎰 번호 생성</button>
  </div>

  <div class="card">
    <div class="label">결과</div>
    <div id="result" class="result"></div>
  </div>

  <div class="card">
    <div class="label">최근 기록</div>
    <div id="history" class="history"></div>
  </div>

</div>

<script>

/* 🔥 storage 대응 */
let memoryHistory=[];
let storage;
try{
  localStorage.setItem("t","1");
  localStorage.removeItem("t");
  storage=localStorage;
}catch(e){
  storage=null;
}

let history=[];
try{
  history=storage?JSON.parse(storage.getItem("lottoHistory"))||[]:memoryHistory;
}catch(e){history=[];}

function saveHistory(nums){
  history.unshift(nums);
  if(history.length>10) history.pop();
  try{
    if(storage){
      storage.setItem("lottoHistory",JSON.stringify(history));
    }else{
      memoryHistory=history;
    }
  }catch(e){}
  renderHistory();
}

function renderHistory(){
  document.getElementById("history").innerHTML=
    history.map((h,i)=>`${i+1}. ${h.join(", ")}`).join("<br>");
}

/* 🔊 효과음 */
let audioCtx;
function playSound(){
  try{
    if(!audioCtx){
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    }
    let now=audioCtx.currentTime;
    for(let i=0;i<10;i++){
      let osc=audioCtx.createOscillator();
      let gain=audioCtx.createGain();
      osc.type="square";
      osc.frequency.setValueAtTime(200+i*30, now+i*0.02);
      gain.gain.setValueAtTime(0.15, now+i*0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now+i*0.02+0.05);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now+i*0.02);
      osc.stop(now+i*0.02+0.05);
    }
  }catch(e){}
}

/* 🔥 색상 */
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaaaaa";
  return "#b0d840";
}

/* 🔥 생성 */
function generate(){

  playSound();

  let count=parseInt(document.getElementById("count").value)||1;
  let fixedInput=document.getElementById("fixed").value||"";
  let useFixed=document.getElementById("fixedToggle").checked;

  let fixed=fixedInput.split(",")
    .map(n=>parseInt(n))
    .filter(n=>!isNaN(n)&&n>=1&&n<=45);

  fixed=[...new Set(fixed)];

  if(fixed.length===0) useFixed=false;

  document.getElementById("result").innerHTML=
    `<div class="loading">🎰 생성 중...</div>`;

  setTimeout(()=>{
    requestAnimationFrame(()=>{

      let output="";

      for(let i=0;i<count;i++){

        let nums=[];

        if(useFixed && fixed.length>0){
          nums=[...fixed];
        }

        while(nums.length<6){
          let n=Math.floor(Math.random()*45)+1;
          if(!nums.includes(n)) nums.push(n);
        }

        nums.sort((a,b)=>a-b);

        let balls=nums.map(n=>
          `<div class="ball" 
            style="background:${getColor(n)};
            border:${fixed.includes(n)&&useFixed?'2px solid #fff':'none'}">
            ${n}
          </div>`
        ).join("");

        output+=`
          <div class="line">
            <div style="width:30px;opacity:0.6">${i+1}</div>
            ${balls}
          </div>
        `;

        saveHistory(nums);
      }

      document.getElementById("result").innerHTML=output;

    });
  },300);
}

/* 🔥 리셋 */
function resetApp(){
  const container=document.querySelector(".container");
  container.classList.add("refresh");

  setTimeout(()=>{
    document.getElementById("fixed").value="";
    document.getElementById("fixedToggle").checked=false;
    document.getElementById("count").value="5";
    document.getElementById("result").innerHTML="";
    container.classList.remove("refresh");
  },350);
}

renderHistory();

</script>

</body>
</html>
