<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 생성기 PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffcc00">

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #1f1f1f, #2e2e2e);
  color:white;
  text-align:center;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  margin:20px;
  padding:20px;
  border-radius:15px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
  margin:5px;
  cursor:pointer;
}

input, select {
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

.ball {
  display:inline-block;
  padding:10px 14px;
  border-radius:50%;
  margin:5px;
  font-weight:bold;
  color:black;
  animation: pop 0.3s;
}

@keyframes pop {
  from {transform:scale(0);}
  to {transform:scale(1);}
}

</style>
</head>

<body>

<h1>🎲 로또 생성기 PRO</h1>

<div class="card">
  <select id="count">
    <option value="1">1줄</option>
    <option value="5" selected>5줄</option>
    <option value="10">10줄</option>
  </select>

  <br>
  <button onclick="generate()">번호 생성</button>
  <button onclick="reset()">초기화</button>
</div>

<div class="card">
  <h3>🏆 당첨번호</h3>
  <input id="win" placeholder="자동 입력 가능">
  <button onclick="getLotto()">자동 불러오기</button>
  <button onclick="checkWin()">비교</button>
</div>

<div class="card" id="result"></div>

<script>
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaa";
  return "#b0d840";
}

let lastNumbers=[];

function generate(){
  let count=document.getElementById("count").value;
  let output="";
  lastNumbers=[];

  for(let i=0;i<count;i++){
    let nums=[];

    while(nums.length<6){
      let n=Math.floor(Math.random()*45)+1;
      if(!nums.includes(n)) nums.push(n);
    }

    nums.sort((a,b)=>a-b);
    lastNumbers.push(nums);

    let balls=nums.map(n=>`<span class="ball" style="background:${getColor(n)}">${n}</span>`).join("");

    output+=`<div>${i+1}번: ${balls}</div>`;
  }

  document.getElementById("result").innerHTML=output;
}

function reset(){
  document.getElementById("result").innerHTML="";
}

function checkWin(){
  let win=document.getElementById("win").value.split(",").map(n=>parseInt(n));
  let output="";

  lastNumbers.forEach((nums,i)=>{
    let match=nums.filter(n=>win.includes(n)).length;
    output+=`${i+1}번: ${nums.join(", ")} 👉 ${match}개 맞음<br>`;
  });

  document.getElementById("result").innerHTML=output;
}

async function getLotto(){
  try{
    let res=await fetch("https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=latest");
    let data=await res.json();

    let nums=[
      data.drwtNo1,
      data.drwtNo2,
      data.drwtNo3,
      data.drwtNo4,
      data.drwtNo5,
      data.drwtNo6
    ];

    document.getElementById("win").value=nums.join(",");
  }catch(e){
    alert("불러오기 실패");
  }
}
</script>

</body>
</html>
