<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>로또 앱</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI";
  background:#0f0f10;
  color:white;
}
.appbar{
  position:sticky;
  top:0;
  background:rgba(28,28,30,0.9);
  backdrop-filter: blur(20px);
  padding:16px;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.container{
  padding:15px;
  padding-bottom:40px;
}
.card{
  background:rgba(255,255,255,0.06);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.label{
  font-size:13px;
  opacity:0.7;
  margin-bottom:6px;
}

/* 🔥 select 숨기고 커스텀 UI */
select{
  display:none;
}

.select-ui{
  width:100%;
  padding:14px;
  border-radius:12px;
  background:#2c2c2e;
  margin-top:6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:15px;
  cursor:pointer;
}
.select-ui::after{
  content:"⌄";
  opacity:0.6;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#2c2c2e;
  color:white;
  font-size:15px;
  margin-top:6px;
}

/* 버튼 */
.btn{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:14px;
  font-size:14px;
  font-weight:bold;
  color:black;
  background:linear-gradient(145deg,#ffd60a,#ffb300);
}

/* 결과 */
.result{display:flex;flex-direction:column;gap:10px;}
.line{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
}
.ball{
  width:34px;height:34px;line-height:34px;
  border-radius:50%;text-align:center;
  margin:4px;font-size:14px;font-weight:bold;
}

/* 🔥 모달 */
.modal{
  position:fixed;
  left:0; right:0; bottom:0;
  background:#1c1c1e;
  border-radius:20px 20px 0 0;
  transform:translateY(100%);
  transition:0.3s;
  z-index:1000;
}
.modal.show{
  transform:translateY(0);
}
.modal-item{
  padding:16px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.modal-item:active{
  background:#333;
}

/* 배경 */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}
.overlay.show{
  opacity:1;
  pointer-events:auto;
}
</style>
</head>

<body>

<div class="appbar">🎲 로또 생성기</div>

<div class="container">

  <div class="card">
    <div class="label">로또 수량</div>
    <div class="select-ui" onclick="openModal('count')">5줄</div>
    <select id="count">
      <option value="1">1줄</option>
      <option value="5" selected>5줄</option>
      <option value="10">10줄</option>
    </select>

    <div class="label" style="margin-top:12px;">고정 번호</div>
    <input id="fixed" placeholder="예: 1,2,3,4">

    <div class="label" style="margin-top:12px;">고정 번호 적용 줄</div>
    <div class="select-ui" onclick="openModal('fixedCount')">고정 안함</div>
    <select id="fixedCount">
      <option value="0">고정 안함</option>
      <option value="1">1줄</option>
      <option value="2">2줄</option>
      <option value="3">3줄</option>
      <option value="4">4줄</option>
      <option value="5">5줄</option>
    </select>

    <button class="btn" onclick="generate()">🎰 번호 생성</button>
  </div>

  <div class="card">
    <div class="label">결과</div>
    <div id="result" class="result"></div>
  </div>

  <div class="card">
    <div class="label">최근 기록</div>
    <div id="history"></div>
  </div>

</div>

<!-- 🔥 모달 -->
<div class="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal"></div>

<script>

/* 🔥 모달 */
let currentSelect;

function openModal(id){
  currentSelect=document.getElementById(id);
  let modal=document.getElementById("modal");
  modal.innerHTML="";

  [...currentSelect.options].forEach(opt=>{
    let div=document.createElement("div");
    div.className="modal-item";
    div.innerText=opt.text;
    div.onclick=()=>{
      currentSelect.value=opt.value;
      updateUI();
      closeModal();
    };
    modal.appendChild(div);
  });

  document.querySelector(".overlay").classList.add("show");
  modal.classList.add("show");
}

function closeModal(){
  document.querySelector(".overlay").classList.remove("show");
  document.getElementById("modal").classList.remove("show");
}

function updateUI(){
  document.querySelectorAll(".select-ui").forEach((ui,i)=>{
    let sel=document.querySelectorAll("select")[i];
    ui.innerText=sel.options[sel.selectedIndex].text;
  });
}

/* 🔥 기존 로직 유지 */
function getColor(n){
  if(n<=10) return "#fbc400";
  if(n<=20) return "#69c8f2";
  if(n<=30) return "#ff7272";
  if(n<=40) return "#aaa";
  return "#b0d840";
}

function generate(){
  let count=parseInt(document.getElementById("count").value)||1;
  let result="";
  for(let i=0;i<count;i++){
    let nums=[];
    while(nums.length<6){
      let n=Math.floor(Math.random()*45)+1;
      if(!nums.includes(n)) nums.push(n);
    }
    nums.sort((a,b)=>a-b);
    let balls=nums.map(n=>`<div class="ball" style="background:${getColor(n)}">${n}</div>`).join("");
    result+=`<div class="line">${balls}</div>`;
  }
  document.getElementById("result").innerHTML=result;
}

updateUI();
</script>

</body>
</html>
